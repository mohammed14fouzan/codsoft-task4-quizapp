<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizCloud | Your Results</title>
    <link rel="stylesheet" href="Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="dashboard-body">
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">Quiz<span>Cloud</span></div>
            <ul>
                <li><a href="Index.HTML">Home</a></li>
                <li><a href="Create.HTML">Create Quiz</a></li>
                <li><a href="Take.HTML">Browse Quizzes</a></li>
                <li><a href="Login.HTML">Logout</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="glass-card result-card">
                <header class="result-header">
                    <h1>Quiz Completed!</h1>
                    <p id="quiz-title-display">Great job finishing the challenge.</p>
                </header>

                <div class="score-visualization">
                    <div class="score-circle">
                        <span id="final-score">0</span>
                        <small>out of <span id="total-questions">0</span></small>
                    </div>
                </div>

                <div class="feedback-area">
                    <h style="background-color: rgb(158, 90, 223);" id="feedback-title">CALCULATING</h>

                    <p id="feedback-subtitle">We are analyzing your performance.</p>
                </div>

                <div class="stats-summary">

                    <div class="stat-item">
                        <span class="label">Accuracy:</span>
                        <span id="accuracy-percent" class="value">0%</span>
                    </div>
                </div>

                <div class="result-actions">
                    <button onclick="window.location.href='Take.HTML'" class="btn-outline">Try Another Quiz</button>
                    <button onclick="window.location.href='Index.HTML'" class="btn-solid">Back to Dashboard</button>
                </div>
            </div>
        </main>
    </div>

    <script src="Script.js"></script>
</body>

</html>
