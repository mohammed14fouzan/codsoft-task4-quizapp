<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizCloud | Dashboard</title>
    <link rel="stylesheet" href="Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">Quiz<span>Cloud</span></div>
            <ul>
                <li><a href="Index.HTML" class="active">Home</a></li>
                <li><a href="Create.HTML">Create Quiz</a></li>
                <li><a href="Take.HTML">Browse Quizzes</a></li>
                <li><a href="Login.HTML">Logout</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <h1>Welcome Back, Explorer!</h1>
                <p>Ready to test your knowledge or challenge others?</p>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Quizzes Created</h3>
                    <p id="created-count">0</p>
                </div>
            </div>

            <section class="quick-actions" style="margin-top: 30px; display: flex; gap: 20px;">
                <a href="Create.HTML" class="btn-solid" style="text-decoration: none;">Create New Quiz</a>
                <a href="Take.HTML" class="btn-outline" style="text-decoration: none;">Take a Quiz</a>
            </section>
        </main>
    </div>
    <script src="Script.js"></script>
</body>

</html>
